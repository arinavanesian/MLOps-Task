name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          DUCKDB_DATABASE: /tmp/test.db
          DAGSTER_HOME: /tmp/dagster_home
        run: |
          mkdir -p $DAGSTER_HOME
          uv run pytest tests/ -v

      - name: Validate Dagster definitions
        env:
          DUCKDB_DATABASE: /tmp/test.db
          DAGSTER_HOME: /tmp/dagster_home
        run: |
          uv run dagster definitions validate -m Ameriabank